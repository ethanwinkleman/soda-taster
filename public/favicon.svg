<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="mug-clip">
      <rect x="10" y="26" width="34" height="28" rx="4"/>
    </clipPath>
  </defs>

  <!-- Background: newspaper ink -->
  <rect width="64" height="64" rx="14" fill="#1a0e06"/>

  <!-- Steam wisps (amber) — rendered first so foam overlaps the base -->
  <path d="M 21,19 Q 24,14 21,9" fill="none" stroke="#c4901a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 33,16 Q 36,11 33,6" fill="none" stroke="#c4901a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Handle (C-shape, cream) -->
  <path d="M 44,33 C 57,33 57,47 44,47 L 44,42 C 51,42 51,38 44,38 Z" fill="#f0e6cf"/>

  <!-- Mug body (parchment cream) -->
  <rect x="10" y="26" width="34" height="28" rx="4" fill="#f0e6cf"/>

  <!-- Dark coffee fill, clipped to mug shape -->
  <rect x="10" y="36" width="34" height="18" fill="#3a1c0c" clip-path="url(#mug-clip)"/>

  <!-- Foam blobs overflowing above the rim -->
  <circle cx="16" cy="27" r="7"   fill="#f5eedc"/>
  <circle cx="27" cy="22" r="8"   fill="#f5eedc"/>
  <circle cx="38" cy="27" r="7"   fill="#f5eedc"/>
  <!-- Bridge rect fills gaps between blobs and connects to mug top -->
  <rect x="10" y="24" width="34" height="9" fill="#f5eedc"/>

  <!-- Subtle foam texture bubbles -->
  <circle cx="21" cy="28" r="2"   fill="#d9c9a8" opacity="0.65"/>
  <circle cx="35" cy="26" r="2.5" fill="#d9c9a8" opacity="0.65"/>
</svg>
