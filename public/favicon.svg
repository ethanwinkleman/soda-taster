<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="mug-clip">
      <path d="M 12,28 L 48,28 L 44,57 Q 44,60 41,60 L 19,60 Q 16,60 16,57 Z"/>
    </clipPath>
  </defs>

  <!-- Background: newspaper ink -->
  <rect width="64" height="64" rx="14" fill="#1a0e06"/>

  <!-- Handle: thick C-shape -->
  <path d="M 48,35 C 62,35 62,51 48,51 L 48,45 C 56,45 56,41 48,41 Z" fill="#f0e6cf"/>

  <!-- Mug body: trapezoid, wider at top like a beer mug -->
  <path d="M 12,28 L 48,28 L 44,57 Q 44,60 41,60 L 19,60 Q 16,60 16,57 Z" fill="#f0e6cf"/>

  <!-- Liquid fill (clipped to mug shape) -->
  <rect x="12" y="37" width="36" height="23" fill="#3a1c0c" clip-path="url(#mug-clip)"/>

  <!-- Foam head: 5 blobs, big and overflowing -->
  <circle cx="14" cy="29" r="6.5" fill="#f5eedc"/>
  <circle cx="22" cy="25" r="7.5" fill="#f5eedc"/>
  <circle cx="30" cy="22" r="8"   fill="#f5eedc"/>
  <circle cx="38" cy="25" r="7.5" fill="#f5eedc"/>
  <circle cx="46" cy="29" r="6.5" fill="#f5eedc"/>
  <!-- Bridge fills gaps between blobs and mug rim -->
  <rect x="12" y="23" width="36" height="11" fill="#f5eedc"/>

  <!-- Subtle foam texture -->
  <circle cx="22" cy="27" r="2"   fill="#d4c49e" opacity="0.65"/>
  <circle cx="36" cy="26" r="2.5" fill="#d4c49e" opacity="0.65"/>
  <circle cx="29" cy="24" r="1.5" fill="#d4c49e" opacity="0.55"/>
</svg>
