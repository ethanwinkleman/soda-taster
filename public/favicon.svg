<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- App icon background with gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="drink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <clipPath id="cup-clip">
      <path d="M15 24 L49 24 L44 56 L20 56 Z"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Cup body -->
  <path d="M15 24 L49 24 L44 56 L20 56 Z" fill="white" opacity="0.95"/>

  <!-- Drink fill clipped to cup shape -->
  <rect x="0" y="30" width="64" height="30" fill="url(#drink)" clip-path="url(#cup-clip)"/>

  <!-- Bubbles inside drink -->
  <circle cx="26" cy="44" r="2.8" fill="white" opacity="0.45"/>
  <circle cx="35" cy="49" r="2" fill="white" opacity="0.35"/>
  <circle cx="30" cy="40" r="1.4" fill="white" opacity="0.3"/>
  <circle cx="39" cy="43" r="1" fill="white" opacity="0.25"/>

  <!-- Cup lid ring -->
  <ellipse cx="32" cy="24" rx="17" ry="3.5" fill="white"/>

  <!-- Straw -->
  <rect x="37" y="5" width="5" height="24" rx="2.5" fill="#fb923c" transform="rotate(6 39.5 17)"/>
  <!-- Straw highlight -->
  <rect x="38" y="5" width="1.5" height="24" rx="0.75" fill="white" opacity="0.35" transform="rotate(6 39.5 17)"/>
</svg>
